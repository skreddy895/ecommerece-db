<!DOCTYPE html>
<html>
<head>
<title>4R Store</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f1f3f6;
}

/* HEADER */
.header {
    background: #131921;
    padding: 15px;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    color: #ff9900;
    font-size: 22px;
    font-weight: bold;
}

.search-box {
    width: 50%;
    display: flex;
}

.search-box input {
    width: 100%;
    padding: 10px;
    border: none;
    outline: none;
}

.search-box button {
    padding: 10px;
    background: #ff9900;
    border: none;
    cursor: pointer;
}

/* PRODUCTS GRID */
.products {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    padding: 20px;
}

.card {
    background: white;
    padding: 12px;
    border-radius: 8px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    height: 160px;
    object-fit: contain;
}

.price {
    color: green;
    font-weight: bold;
}

.btn {
    background: #ffd814;
    padding: 8px;
    border: none;
    width: 100%;
    margin-top: 5px;
    cursor: pointer;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="header">
    <div class="logo">4R Store</div>

    <div class="search-box">
        <input id="query" placeholder="Search products...">
        <button onclick="search()">Search</button>
    </div>

    <div>🛒 <span id="cart">0</span></div>
</div>

<div id="products" class="products"></div>

<script>

let cart = 0;

// Load products on page open
window.onload = async () => {
    let res = await fetch("/products");
    let data = await res.json();
    show(data.data);
};

// Search function
function search(){
    let q = document.getElementById("query").value;
    fetchData(q);
}

// Chat / filter API
async function fetchData(q){
    let res = await fetch("/chat?query=" + q);
    let data = await res.json();
    show(data.data);
}

// Show products
function show(products){
    let html = "";

    products.forEach(p => {

        let img = p.image ? p.image : "https://via.placeholder.com/150";

        html += `
        <div class="card">
            <img src="${img}">
            <h3>${p.name}</h3>
            <p>${p.category}</p>
            <p class="price">₹${p.price}</p>
            <button class="btn" onclick="add()">Add to Cart</button>
        </div>`;
    });

    document.getElementById("products").innerHTML = html;
}

// Cart
function add(){
    cart++;
    document.getElementById("cart").innerText = cart;
}

</script>

</body>
</html>
